name: Roll Call

on:
  schedule:
    # GitHub Actions free-tier scheduling is unreliable; we fire 5 attempts
    # spread across 10:03-10:59 Israel DST so at least one lands. The cache-based
    # dedup step below ensures only the first successful run posts each day,
    # regardless of trigger type. Manual runs also save the marker so a delayed
    # scheduled run later that day skips instead of double-posting.
    - cron: '30 7 * * 0-4'   # 07:30 UTC = 10:30 Israel DST, Sun-Thu (once daily)
  workflow_dispatch:         # lets you trigger manually from the Actions tab

permissions:
  contents: write

jobs:
  roll-call:
    runs-on: ubuntu-latest
    steps:
      - name: Set today date
        run: echo "TODAY=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Daily idempotency cache
        id: dedup
        uses: actions/cache@v4
        with:
          path: .roll-call-marker
          key: roll-call-${{ env.TODAY }}

      - name: Skip if already posted today
        if: steps.dedup.outputs.cache-hit == 'true'
        run: echo "Already posted today; skipping remaining steps."

      - name: Checkout
        if: steps.dedup.outputs.cache-hit != 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: steps.dedup.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Roll Call
        if: steps.dedup.outputs.cache-hit != 'true'
        id: rollcall
        env:
          SHAPES_REFRESH_TOKEN: ${{ secrets.SHAPES_REFRESH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          node scripts/roll-call.js
          touch .roll-call-marker

      - name: Keep workflow alive
        # Prevents GitHub from auto-disabling this scheduled workflow after 60
        # days of no repo activity. Only commits when the repo has been idle for
        # >=50 days, so it stays quiet. Uses GH_PAT so the push counts as real
        # repository activity and resets the inactivity timer.
        if: steps.dedup.outputs.cache-hit != 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          LAST=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          AGE_DAYS=$(( (NOW - LAST) / 86400 ))
          if [ "$AGE_DAYS" -ge 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore: keepalive ($(date -u +%F))"
            git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
            git push origin HEAD:main
          else
            echo "Repo committed ${AGE_DAYS}d ago; keepalive commit not needed."
          fi

      - name: Persist rotated refresh token
        # Only runs if the Shapes API returned a different refresh token than we had.
        # Needs GH_PAT (a PAT with "repo" scope) so it can write to repo secrets.
        if: steps.rollcall.outputs.rotated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_TOKEN: ${{ steps.rollcall.outputs.new_refresh_token }}
        run: |
          echo "Rotating stored SHAPES_REFRESH_TOKEN."
          gh secret set SHAPES_REFRESH_TOKEN \
            --repo "${{ github.repository }}" \
            --body "$NEW_TOKEN"
